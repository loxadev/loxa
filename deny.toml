[advisories]
yanked = "deny"

[licenses]
allow = [
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "MIT",
  "Unicode-3.0",
  "Unicode-DFS-2016",
]
unused-allowed-license = "allow"

# Required for reqwest's rustls certificate path; only this root data crate uses
# CDLA-Permissive-2.0 in the current dependency graph.
[[licenses.exceptions]]
allow = ["CDLA-Permissive-2.0"]
crate = "webpki-root-certs"
