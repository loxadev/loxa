name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  repository-hygiene:
    name: repository hygiene
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Reject generated or agent-context files
        shell: bash
        run: |
          tracked="$({ git ls-files; } | awk '/(^|\/)(\.pnpm-store|\.superpowers|node_modules|target)(\/|$)/')"
          if [[ -n "$tracked" ]]; then
            echo "Generated or temporary paths must not be tracked:"
            echo "$tracked"
            exit 1
          fi

      - name: Check repository whitespace
        shell: bash
        run: git diff --check "$(git hash-object -t tree /dev/null)" HEAD

      - name: Verify committed Rust lockfiles
        run: |
          cargo metadata --locked --no-deps --format-version 1 > /dev/null
          cargo metadata --manifest-path loxa-app/src-tauri/Cargo.toml --locked --no-deps --format-version 1 > /dev/null

  fmt:
    name: cargo fmt
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        run: rustup toolchain install --profile minimal --no-self-update

      - name: Check formatting
        run: |
          cargo fmt --all --check
          cargo fmt --manifest-path loxa-app/src-tauri/Cargo.toml --all --check

  clippy:
    name: cargo clippy (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-15]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        run: rustup toolchain install --profile minimal --no-self-update

      - name: Cache Rust
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Run clippy
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

  test:
    name: cargo test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        # macos-15 is arm64 on GitHub-hosted runners, matching the target Apple silicon machine.
        os: [ubuntu-24.04, macos-15]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        run: rustup toolchain install --profile minimal --no-self-update

      - name: Cache Rust
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Run tests
        run: cargo test --workspace --all-features --locked

  unsupported-control-state-platform:
    name: unsupported control-state platform (Windows)
    runs-on: windows-2025
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        run: rustup toolchain install --profile minimal --no-self-update

      - name: Cache Rust
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Compile the unsupported control-state target
        run: cargo check -p loxa-node --all-targets --all-features --locked

      - name: Prove production preflight refusal is mutation-free
        run: cargo test -p loxa-node production_preflight_rejects_unsupported_platform_before_filesystem_mutation --locked

  frontend:
    name: desktop frontend
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    defaults:
      run:
        working-directory: loxa-app
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install pnpm
        uses: pnpm/action-setup@9fd676a19091d4595eefd76e4bd31c97133911f1 # v4.2.0
        with:
          version: 11.7.0
      - name: Install Node
        uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version: 24.18.0
          cache: pnpm
          cache-dependency-path: loxa-app/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium
      - name: Check formatting
        run: pnpm format:check
      - name: Lint
        run: pnpm lint
      - name: Typecheck
        run: pnpm typecheck
      - name: Unit tests
        run: pnpm test:unit
      - name: Browser tests
        run: pnpm test:browser
      - name: Build
        run: pnpm build

  frontend-packaging:
    name: desktop package (macOS)
    runs-on: macos-15
    timeout-minutes: 30
    defaults:
      run:
        working-directory: loxa-app
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install pnpm
        uses: pnpm/action-setup@9fd676a19091d4595eefd76e4bd31c97133911f1 # v4.2.0
        with:
          version: 11.7.0
      - name: Install Node
        uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version: 24.18.0
          cache: pnpm
          cache-dependency-path: loxa-app/pnpm-lock.yaml
      - name: Install Rust
        run: rustup toolchain install --profile minimal --no-self-update
      - name: Cache Rust
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: loxa-app/src-tauri
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Prepare bundled node sidecar
        run: pnpm prepare:sidecar
      - name: Lint desktop Rust
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets --locked -- -D warnings
      - name: Test desktop Rust
        run: cargo test --manifest-path src-tauri/Cargo.toml --locked
      - name: Packaging contract tests
        run: pnpm exec vitest run tests/workspace-isolation.test.ts
      - name: Build packaged app
        run: pnpm package:app -- --debug
