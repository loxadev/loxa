name: Audit

on:
  pull_request:
    paths:
      - Cargo.toml
      - Cargo.lock
      - "**/Cargo.toml"
      - loxa-app/src-tauri/Cargo.lock
      - deny.toml
      - rust-toolchain.toml
      - .github/workflows/audit.yml
  push:
    branches: [main]
    paths:
      - Cargo.toml
      - Cargo.lock
      - "**/Cargo.toml"
      - loxa-app/src-tauri/Cargo.lock
      - deny.toml
      - rust-toolchain.toml
      - .github/workflows/audit.yml
  schedule:
    - cron: "0 9 * * 1"

permissions:
  contents: read

concurrency:
  group: audit-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  cargo-deny:
    name: cargo deny
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        run: rustup toolchain install --profile minimal --no-self-update

      - name: Install cargo-deny
        uses: taiki-e/install-action@16b05812d776ae1dfaabc8277e421fb6d2506419 # v2.82.7
        with:
          tool: cargo-deny
          fallback: none

      - name: Check workspace dependencies
        run: cargo deny --locked check --warn unmaintained

      - name: Check desktop dependencies
        run: cargo deny --manifest-path loxa-app/src-tauri/Cargo.toml --target aarch64-apple-darwin --locked check --warn unmaintained advisories bans sources
