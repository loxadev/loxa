name: Nightly Runner Canary

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nightly-runner-canary
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-latest:
    name: Rust latest runner (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Rust toolchain
        run: rustup toolchain install --profile minimal --no-self-update
      - name: Cache Rust
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
      - name: Run tests
        run: cargo test --workspace --all-features --locked

  desktop-frontend-latest:
    name: Desktop frontend latest runner
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: loxa-app
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install pnpm
        uses: pnpm/action-setup@9fd676a19091d4595eefd76e4bd31c97133911f1 # v4.2.0
        with:
          version: 11.7.0
      - name: Install Node
        uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version: 24.18.0
          cache: pnpm
          cache-dependency-path: loxa-app/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium
      - name: Run frontend checks
        run: pnpm check

  desktop-package-latest:
    name: Desktop package latest runner
    runs-on: macos-latest
    timeout-minutes: 40
    defaults:
      run:
        working-directory: loxa-app
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install pnpm
        uses: pnpm/action-setup@9fd676a19091d4595eefd76e4bd31c97133911f1 # v4.2.0
        with:
          version: 11.7.0
      - name: Install Node
        uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version: 24.18.0
          cache: pnpm
          cache-dependency-path: loxa-app/pnpm-lock.yaml
      - name: Install Rust
        run: rustup toolchain install --profile minimal --no-self-update
      - name: Cache Rust
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: |
            .
            loxa-app/src-tauri
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Prepare bundled node sidecar
        run: pnpm prepare:sidecar
      - name: Lint desktop Rust
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets --locked -- -D warnings
      - name: Test desktop Rust
        run: cargo test --manifest-path src-tauri/Cargo.toml --locked
      - name: Packaging contract tests
        run: pnpm exec vitest run tests/workspace-isolation.test.ts
      - name: Build packaged app
        run: pnpm package:app -- --debug
